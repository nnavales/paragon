# theme_name Dunst Theme
# Upstream: https://github.com/nnahuel/

[global]
# Frame - using overlay for subtle borders
frame_color = "#272C2F"
separator_color = frame

# Highlight - cyan for URLs and interactive elements
highlight = "#9EDFE2"

[urgency_low]
# Low priority - muted appearance
background = "#1F2225"
foreground = "#8B9C9F"
frame_color = "#33383C"

[urgency_normal]
# Normal priority - standard appearance
background = "#1F2225"
foreground = "#E9F2F2"
frame_color = "#272C2F"

[urgency_critical]
# Critical priority - red frame for attention
background = "#1F2225"
foreground = "#E9F2F2"
frame_color = "#D04E63"
