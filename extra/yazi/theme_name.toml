# theme_name - Clean Yazi Theme
# Upstream: https://github.com/nnahuel/

# =============================================================================
# Manager (File Manager)
# =============================================================================

[mgr]
cwd = { fg = "#C3D0D2", italic = true }

hovered = { bg = "#202325" }
preview_hovered = { bg = "#202325" }

find_keyword = { fg = "#181A1C", bg = "#EAD88A", bold = true }
find_position = { fg = "#9EDFE2", bg = "#1B1E20", bold = true }

# Markers - using semantic colors
marker_copied = { fg = "#72C472", bg = "#72C472" }
marker_cut = { fg = "#D04E63", bg = "#D04E63" }
marker_marked = { fg = "#B8A0D5", bg = "#B8A0D5" }
marker_selected = { fg = "#9EDFE2", bg = "#9EDFE2" }

# Count badges
# count_copied = { fg = "#181A1C", bg = "#72C472" }
# count_cut = { fg = "#181A1C", bg = "#D04E63" }
# count_selected = { fg = "#181A1C", bg = "#9EDFE2" }

# Border - visible but subtle
border_symbol = "Ôöé"
border_style = { fg = "#33383C" }

# =============================================================================
# Tabs
# =============================================================================

[tabs]
active = { fg = "#181A1C", bg = "#9EDFE2", bold = true }
inactive = { fg = "#9EDFE2", bg = "#1F2225" }

# Simple tabs without powerline
sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# =============================================================================
# Mode Indicator
# =============================================================================

[mode]
# Normal mode - cyan (functions)
normal_main = { fg = "#181A1C", bg = "#9EDFE2", bold = true }
normal_alt = { fg = "#9EDFE2", bg = "#1B1E20" }

# Select mode - magenta (hints)
select_main = { fg = "#181A1C", bg = "#B8A0D5", bold = true }
select_alt = { fg = "#B8A0D5", bg = "#1B1E20" }

# Unset mode - teal (types)
unset_main = { fg = "#181A1C", bg = "#5FB3A3", bold = true }
unset_alt = { fg = "#5FB3A3", bg = "#1B1E20" }

# =============================================================================
# Selection Indicator
# =============================================================================

[indicator]
parent = { fg = "#6E797E" }
current = { bg = "#33383C", bold = true }
preview = { fg = "#6E797E" }
padding = { open = " ", close = " " }

# =============================================================================
# Status Bar
# =============================================================================

[status]
overall = { fg = "#E9F2F2", bg = "#1F2225" }
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Progress
progress_label = { fg = "#E9F2F2", bold = true }
progress_normal = { fg = "#5FB3A3", bg = "#202325" }
progress_error = { fg = "#D04E63", bg = "#202325" }

# Permissions - clear differentiation
perm_sep = { fg = "#33383C" }
perm_type = { fg = "#5FB3A3" }
perm_read = { fg = "#E69A6C" }
perm_write = { fg = "#D04E63" }
perm_exec = { fg = "#72C472" }

# =============================================================================
# Which Key Menu
# =============================================================================

[which]
cols = 3
mask = { bg = "#131618" }
cand = { fg = "#9EDFE2" }
rest = { fg = "#7A878A" }
desc = { fg = "#C3D0D2" }
separator = "  "
separator_style = { fg = "#33383C" }

# =============================================================================
# Confirm Dialog
# =============================================================================

[confirm]
border = { fg = "#33383C" }
title = { fg = "#9EDFE2" }
btn_yes = { fg = "#181A1C", bg = "#72C472", bold = true }
btn_no = { fg = "#E9F2F2", bg = "#272C2F" }
btn_labels = [ "  Yes  ", "  No  " ]

# =============================================================================
# Spotter (File Info)
# =============================================================================

[spot]
border = { fg = "#33383C" }

# =============================================================================
# Notifications
# =============================================================================

[notify]
title_info = { fg = "#9EDFE2" }
title_warn = { fg = "#E69A6C" }
title_error = { fg = "#D04E63" }
icon_info = "´üÜ"
icon_warn = "´ü▒"
icon_error = "´üù"

# =============================================================================
# Picker
# =============================================================================

[pick]
border = { fg = "#33383C" }
active = { fg = "#E9F2F2", bg = "#33383C" }
inactive = { fg = "#8B9C9F" }

# =============================================================================
# Input
# =============================================================================

[input]
border = { fg = "#33383C" }
title = { fg = "#9EDFE2" }
value = { fg = "#E9F2F2" }
selected = { bg = "#33383C" }

# =============================================================================
# Completion
# =============================================================================

[cmp]
border = { fg = "#33383C" }
active = { fg = "#E9F2F2", bg = "#33383C" }
inactive = { fg = "#8B9C9F" }

# =============================================================================
# Tasks
# =============================================================================

[tasks]
border = { fg = "#33383C" }
hovered = { fg = "#E9F2F2", bg = "#202325" }

# =============================================================================
# Help Menu
# =============================================================================

[help]
on = { fg = "#72C472" }
run = { fg = "#B8A0D5" }
desc = { fg = "#C3D0D2" }
hovered = { bg = "#202325" }
footer = { fg = "#8B9C9F", bg = "#181A1C" }

# =============================================================================
# File Type Highlighting
# =============================================================================

[filetype]
rules = [
    # Images - yellow (constants)
    { mime = "image/*", fg = "#EAD88A" },

    # Media - magenta (hints)
    { mime = "{audio,video}/*", fg = "#B8A0D5" },

    # Archives - red (danger/action)
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#D04E63" },

    # Documents - cyan (functions)
    { mime = "application/{pdf,doc,rtf}", fg = "#9EDFE2" },

    # Symlinks - fg_dim
    { mime = "vfs/{absent,stale}", fg = "#6E797E" },

    # Orphan files - red background
    { name = "*", is = "orphan", bg = "#D04E63" },

    # Executables - green (keywords)
    { name = "*", is = "exec", fg = "#72C472" },

    # Directories - cyan (functions)
    { name = "*/", fg = "#9EDFE2" },

    # Fallback - main text
    { name = "*", fg = "#E9F2F2" }
]

